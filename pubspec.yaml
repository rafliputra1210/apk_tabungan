name: tabunganku
description: Aplikasi pencatat tabungan dengan target dan rencana pengisian berkala
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database & State Management
  cloud_firestore: ^6.5.0
  cupertino_icons: ^1.0.2
  firebase_core: ^4.10.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  path: ^1.8.3
  percent_indicator: ^3.4.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

